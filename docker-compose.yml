version: '3.8'
services:
  aml-workspace:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NOTION_TOKEN=${NOTION_TOKEN}
      - NOTION_DB_DOCUMENTS=${NOTION_DB_DOCUMENTS}
      - NOTION_DB_ORG=${NOTION_DB_ORG}
      - NOTION_DB_KPI=${NOTION_DB_KPI}
      - NOTION_DB_SELF_EVAL=${NOTION_DB_SELF_EVAL}
      - NOTION_DB_SUSPICIOUS=${NOTION_DB_SUSPICIOUS}
    restart: unless-stopped
